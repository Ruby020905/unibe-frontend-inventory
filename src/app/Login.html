<div class="relative min-h-screen flex items-center justify-center p-4 overflow-hidden">
  
  <div class="absolute inset-0 z-0">
    <img src="https://avirtual.unibe.edu.ec/pluginfile.php/1/theme_moove/sliderimage1/1750182024/banner2.jpg" 
         class="w-full h-full object-cover scale-110 blur-md brightness-50" 
         alt="Fondo Médico">
    <div class="absolute inset-0 bg-[#005596]/30"></div>
  </div>

  <div class="relative z-10 bg-white/90 backdrop-blur-md p-8 md:p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white/20">
    
    <div class="flex flex-col items-center mb-8">
      <div class="w-28 h-28 mb-4 p-4 bg-white rounded-3xl shadow-lg flex items-center justify-center">
        <img src="/assets/unibe-logo.jpeg" 
             onerror="this.src='/assets/unibe-logo.jpeg'"
             alt="Logo UNIBE" 
             class="w-full h-full object-contain">
      </div>
      <h1 class="text-3xl font-black text-[#005596] tracking-tighter uppercase">UNIBE</h1>
      <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">Inventario Médico</p>
    </div>

    <div *ngIf="error" class="mb-6 p-3 bg-red-100 border-l-4 border-red-600 text-red-700 text-xs font-bold rounded">
      {{ error }}
    </div>

    <form (ngSubmit)="onLogin()" class="space-y-5">
      
      <div class="space-y-1">
        <label class="text-[10px] font-black text-[#005596] uppercase ml-1">Usuario</label>
        <input [(ngModel)]="username" name="username" required
               placeholder="usuario o administrador"
               class="w-full p-4 rounded-2xl border-2 border-gray-100 bg-white/50 focus:bg-white focus:border-[#005596] transition-all outline-none text-gray-700 shadow-sm"/>
      </div>

      <div class="space-y-1">
        <label class="text-[10px] font-black text-[#005596] uppercase ml-1">Contraseña</label>
       <input type="password" 
       [(ngModel)]="password" 
       (input)="error = ''" 
       name="password" 
       required
               placeholder="••••••••"
               class="w-full p-4 rounded-2xl border-2 border-gray-100 bg-white/50 focus:bg-white focus:border-[#005596] transition-all outline-none text-gray-700 shadow-sm"/>
      </div>

     <button type="submit"
        [disabled]="!username || !password" 
        class="w-full bg-[#005596] text-white p-4 rounded-2xl font-black text-lg ... transition-all duration-300 disabled:opacity-50">
{{ isLoading ? 'VALIDANDO...' : 'INGRESAR' }}</button>
    </form>
    
    <div class="mt-10 text-center">
      <p class="text-[8px] font-bold text-gray-400 uppercase tracking-widest">© 2026 Universidad Iberoamericana del Ecuador</p>
    </div>
  </div>
</div>
